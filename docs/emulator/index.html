---
layout: default
permalink: /emulator/
title: Dev Studio
description: Run and build PicoPanda games in the browser (WebAssembly).
---
{% assign pp_emu_js = '/emulator/PicoPanda_Studio.js' | relative_url %}
{% assign pp_emu_dir = '/emulator/' | relative_url %}
<script src="{{ '/emulator/coi-serviceworker.js' | relative_url }}"></script>

<article class="post">
  <div class="post-content pp-emulator-page">
    <noscript>This page requires JavaScript.</noscript>
    <canvas id="canvas" tabindex="-1" oncontextmenu="event.preventDefault()"
      title="Drag a PicoPanda game .bin here"></canvas>
  </div>
</article>
<style>
  /* Emulator-specific stability: avoid full-page overlay repaints causing flashes. */
  body.pp-retro::before {
    display: none !important;
  }
  body.pp-retro .pp-emulator-page::after {
    display: none !important;
  }
  body.pp-retro .pp-emulator-page #canvas {
    image-rendering: pixelated;
    background-color: #05090d;
  }
</style>

<script>
    (function () {
      var emuDir = {{ pp_emu_dir | jsonify }};
      var emuJs = {{ pp_emu_js | jsonify }};

      function preventNav(e) {
        e.preventDefault();
        e.stopPropagation();
      }

      function stageFileAndNotify(file) {
        if (!file) return;
        var reader = new FileReader();
        reader.onload = function () {
          try {
            var data = new Uint8Array(reader.result);
            var len = data.length;
            var ptr = Module['_malloc'](len);
            if (!ptr) {
              console.error('PicoPanda WASM: malloc failed for drop');
              return;
            }
            Module['HEAPU8'].set(data, ptr);
            var ret = Module['ccall'](
              'wasm_stage_drop_from_heap',
              'number',
              ['number', 'number'],
              [ptr, len]
            );
            Module['_free'](ptr);
            if (ret !== 0) {
              console.error('PicoPanda WASM: wasm_stage_drop_from_heap failed:', ret);
            }
          } catch (err) {
            console.error('PicoPanda WASM: failed to stage drop', err);
          }
        };
        reader.onerror = function () {
          console.error('PicoPanda WASM: FileReader error');
        };
        reader.readAsArrayBuffer(file);
      }

      function onDrop(e) {
        preventNav(e);
        var dt = e.dataTransfer;
        if (!dt || !dt.files || dt.files.length === 0) return;
        stageFileAndNotify(dt.files[0]);
      }

      function installFileDrop() {
        var canvas = document.getElementById('canvas');
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(function (ev) {
          window.addEventListener(ev, ev === 'drop' ? onDrop : preventNav, false);
        });
        if (canvas) {
          ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(function (ev) {
            canvas.addEventListener(ev, ev === 'drop' ? onDrop : preventNav, false);
          });
        }
      }

      function stabilizeCanvasSizingRuntime() {
        if (typeof Browser === 'undefined' || !Browser.updateCanvasDimensions) return;
        var originalUpdateCanvasDimensions = Browser.updateCanvasDimensions;
        Browser.updateCanvasDimensions = function (canvas, wNative, hNative) {
          if (!canvas) return;
          // Guard against transient undefined native dimensions, which can reset
          // the canvas backbuffer and show up as visible flashes.
          if (!canvas.widthNative || !canvas.heightNative) {
            canvas.widthNative = canvas.width || 1;
            canvas.heightNative = canvas.height || 1;
          }
          return originalUpdateCanvasDimensions.call(Browser, canvas, wNative, hNative);
        };
      }


      var Module = {
        mainScriptUrlOrBlob: emuJs,
        locateFile: function (path) {
          path = String(path || '');
          if (path.charAt(0) === '/') {
            return path;
          }
          return emuDir + path.replace(/^\.\//, '');
        },
        canvas: (function () {
          var c = document.getElementById('canvas');
          if (!c) { console.error('PicoPanda WASM: missing #canvas'); }
          return c;
        })(),
        preRun: [stabilizeCanvasSizingRuntime],
        postRun: [installFileDrop]
      };
      window.Module = Module;
    })();
</script>
<script src="{{ pp_emu_js }}"></script>
